  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y=\"8\"><\u002Fellipse><ellipse cx=\"-7\" cy=\"-24\" rx=\"3\" ry=\"7\" transform=\"rotate(-30 -7 -24)\"><\u002Fellipse><ellipse cx=\"7\" cy=\"-24\" rx=\"3\" ry=\"7\" transform=\"rotate(30 7 -24)\"><\u002Fellipse><ellipse cx=\"-8\" cy=\"-12\" rx=\"3\" ry=\"7\" transform=\"rotate(-30 -8 -12)\"><\u002Fellipse><ellipse cx=\"8\" cy=\"-12\" rx=\"3\" ry=\"7\" transform=\"rotate(30 8 -12)\"><\u002Fellipse><ellipse cx=\"-8\" cy=\"0\" rx=\"3\" ry=\"7\" transform=\"rotate(-30 -8 0)\"><\u002Fellipse><ellipse cx=\"8\" cy=\"0\" rx=\"3\" ry=\"7\" transform=\"rotate(30 8 0)\"><\u002Fellipse><\u002Fg><\u002Fg>\n    <g transform=\"translate(292, 200) rotate(12)\"><line x1=\"0\" y1=\"40\" x2=\"0\" y2=\"-34\" class=\"k-thin\"><\u002Fline><g class=\"ink\"><ellipse cx=\"0\" cy=\"-34\" rx=\"3.5\" ry=\"8\"><\u002Fellipse><ellipse cx=\"-7\" cy=\"-24\" rx=\"3\" ry=\"7\" transform=\"rotate(-30 -7 -24)\"><\u002Fellipse><ellipse cx=\"7\" cy=\"-24\" rx=\"3\" ry=\"7\" transform=\"rotate(30 7 -24)\"><\u002Fellipse><ellipse cx=\"-8\" cy=\"-12\" rx=\"3\" ry=\"7\" transform=\"rotate(-30 -8 -12)\"><\u002Fellipse><ellipse cx=\"8\" cy=\"-12\" rx=\"3\" ry=\"7\" transform=\"rotate(30 8 -12)\"><\u002Fellipse><ellipse cx=\"-8\" cy=\"0\" rx=\"3\" ry=\"7\" transform=\"rotate(-30 -8 0)\"><\u002Fellipse><ellipse cx=\"8\" cy=\"0\" rx=\"3\" ry=\"7\" transform=\"rotate(30 8 0)\"><\u002Fellipse><\u002Fg><\u002Fg>\n    <path d=\"M 150 248 Q 200 258 250 248\" class=\"k-thin\"><\u002Fpath>\n    <g class=\"k-stroke\"><path d=\"M 172 244 Q 200 250 228 244\"><\u002Fpath><path d=\"M 168 230 Q 200 238 232 230\"><\u002Fpath><path d=\"M 170 216 Q 200 224 230 216\"><\u002Fpath><path d=\"M 174 202 Q 200 210 226 202\"><\u002Fpath><path d=\"M 180 188 Q 200 195 220 188\"><\u002Fpath><path d=\"M 188 176 Q 200 181 212 176\"><\u002Fpath><\u002Fg>\n    <path d=\"M 172 244 Q 160 200 200 168 Q 240 200 228 244 Z\" class=\"k-stroke\"><\u002Fpath>\n    <path d=\"M 194 244 Q 194 232 200 232 Q 206 232 206 244 Z\" class=\"ink\"><\u002Fpath>\n    <line x1=\"200\" y1=\"168\" x2=\"200\" y2=\"160\" class=\"k-stroke\"><\u002Fline>\n    <circle cx=\"200\" cy=\"158\" r=\"3\" class=\"ink\"><\u002Fcircle>\n    <g class=\"honey\"><ellipse cx=\"150\" cy=\"185\" rx=\"4\" ry=\"3\"><\u002Fellipse><ellipse cx=\"252\" cy=\"195\" rx=\"4\" ry=\"3\"><\u002Fellipse><ellipse cx=\"238\" cy=\"160\" rx=\"3.5\" ry=\"2.6\"><\u002Fellipse><\u002Fg>\n    <g class=\"k-fine\"><line x1=\"148\" y1=\"183\" x2=\"148\" y2=\"187\"><\u002Fline><line x1=\"152\" y1=\"183\" x2=\"152\" y2=\"187\"><\u002Fline><path d=\"M 146 182 Q 144 178 148 180\"><\u002Fpath><line x1=\"250\" y1=\"193\" x2=\"250\" y2=\"197\"><\u002Fline><line x1=\"254\" y1=\"193\" x2=\"254\" y2=\"197\"><\u002Fline><path d=\"M 256 192 Q 260 188 256 191\"><\u002Fpath><line x1=\"236\" y1=\"159\" x2=\"236\" y2=\"161.5\"><\u002Fline><line x1=\"240\" y1=\"159\" x2=\"240\" y2=\"161.5\"><\u002Fline><\u002Fg>\n    <path d=\"M 160 188 Q 185 150 215 165 Q 245 178 248 192\" class=\"k-fine\" stroke-dasharray=\"2 5\"><\u002Fpath>\n  <\u002Fsymbol>\n<\u002Fsvg>\n\n<div style=\"--honey:{{ accent }};background:#f2ecd9;color:#3a4a2b;background-image:radial-gradient(rgba(58,74,43,.05) 1px,transparent 1px);background-size:5px 5px;min-height:100vh;padding:clamp(10px,3.5vw,26px);font-family:Spectral,Georgia,serif;overflow-x:hidden\">\n  <div style=\"max-width:980px;margin:0 auto;border:2px solid #3a4a2b\">\n\n    <!-- masthead bar -->\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:4px 14px;padding:clamp(10px,3vw,12px) clamp(16px,4vw,26px);border-bottom:1px solid #3a4a2b;font-family:'Spectral SC',Georgia,serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase\">\n      <span>The Unplugged<\u002Fspan>\n      <span style=\"color:var(--honey,#c98a2b);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em\">· Till · Tend · Gather ·<\u002Fspan>\n      <span>Est. MMXXVI<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- hero -->\n    <div style=\"padding:clamp(36px,6vw,56px) clamp(20px,5vw,64px) clamp(32px,5vw,48px);text-align:center;border-bottom:1px solid #3a4a2b\">\n      <div style=\"display:flex;justify-content:center;margin-bottom:22px\"><svg viewBox=\"0 0 400 400\" width=\"150\" height=\"150\" style=\"width:clamp(112px,26vw,150px);height:auto\"><use href=\"#mark\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--honey,#c98a2b);margin-bottom:20px\">A self-sufficient community · {{ location }} · Pop. {{ population }} · Elev. {{ elevation }}<\u002Fdiv>\n      <h1 style=\"margin:0 0 20px;font-family:'IM Fell English',Georgia,serif;font-weight:400;font-size:clamp(34px,8vw,64px);line-height:1.04;letter-spacing:.005em\">A handmade life,<br>high in the mountains.<\u002Fh1>\n      <p style=\"margin:0 auto 30px;max-width:560px;font-size:19px;line-height:1.6;color:#4a5a3a\">A self-sufficient community taking root above Lake Wānaka — and right now it's just one of us. We're looking for the first hands to grow, build, and gather everything we need, together and off the grid.<\u002Fp>\n      <div style=\"display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap\">\n        <a href=\"#packet\" style=\"display:inline-block;background:#3a4a2b;color:#f2ecd9;text-decoration:none;font-family:'Spectral SC',Georgia,serif;font-size:16px;letter-spacing:.08em;padding:14px 28px;border:2px solid #3a4a2b\">Request an info packet<\u002Fa>\n        <a href=\"#vision\" style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#3a4a2b;text-decoration:none;border-bottom:1px solid var(--honey,#c98a2b);padding-bottom:2px\">Read our way of life ↓<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- valley illustration band -->\n    <div style=\"height:190px;border-bottom:1px solid #3a4a2b;background:#f2ecd9 url(&quot;7e904f57-050f-4ab2-baf1-1c0d49826a5b&quot;) center bottom/cover no-repeat\"><\u002Fdiv>\n\n    <!-- vision -->\n    <div id=\"vision\" style=\"padding:clamp(34px,5.5vw,52px) clamp(20px,5vw,64px);border-bottom:1px solid #3a4a2b;scroll-margin-top:10px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--honey,#c98a2b);margin-bottom:14px\">I. The Vision<\u002Fdiv>\n      <h2 style=\"margin:0 0 24px;font-family:'IM Fell English',Georgia,serif;font-weight:400;font-size:clamp(27px,5.5vw,40px);line-height:1.1;max-width:640px\">We unplugged so we could pay attention.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:clamp(20px,4vw,38px)\">\n        <p style=\"margin:0;font-size:17px;line-height:1.65;color:#4a5a3a\">There is a different quiet up here. No notifications, no feed — only the weather, the work, and one another. This isn't about running from the modern world so much as remembering an older one, where a day was measured by what you made of it.<\u002Fp>\n        <p style=\"margin:0;font-size:17px;line-height:1.65;color:#4a5a3a\">The plan is simple and slow: grow our own food, mend our own roofs, and keep the lamps lit from the stream and the sun. None of it will be easy. All of it will be shared. This is an invitation to belong — to a place, and to each other.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:0;margin-top:36px;border-top:1px solid #3a4a2b;border-bottom:1px solid #3a4a2b\">\n        <div style=\"flex:1 1 200px;padding:18px 22px;border-right:1px solid #3a4a2b\"><div style=\"font-family:'IM Fell English',Georgia,serif;font-size:23px\">Enough, not more.<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1 1 200px;padding:18px 22px;border-right:1px solid #3a4a2b\"><div style=\"font-family:'IM Fell English',Georgia,serif;font-size:23px\">Made, not bought.<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1 1 200px;padding:18px 22px\"><div style=\"font-family:'IM Fell English',Georgia,serif;font-size:23px\">Together, not alone.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- self-sufficiency -->\n    <div style=\"padding:clamp(34px,5.5vw,52px) clamp(20px,5vw,64px);border-bottom:1px solid #3a4a2b\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--honey,#c98a2b);margin-bottom:14px\">II. How we'll live off the grid<\u002Fdiv>\n      <h2 style=\"margin:0 0 32px;font-family:'IM Fell English',Georgia,serif;font-weight:400;font-size:clamp(27px,5.5vw,40px);line-height:1.1\">Everything we need, made between us.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(258px,1fr));gap:0;border:1px solid #3a4a2b\">\n        <div style=\"padding:28px 30px;border-right:1px solid #3a4a2b;border-bottom:1px solid #3a4a2b\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--honey,#c98a2b);margin-bottom:8px\">01<\u002Fdiv>\n          <h3 style=\"margin:0 0 10px;font-family:'IM Fell English',Georgia,serif;font-weight:400;font-size:26px\">The Farm<\u002Fh3>\n          <p style=\"margin:0;font-size:15px;line-height:1.6;color:#4a5a3a\">Two acres of terraced beds, a glasshouse against the frost, and a small herd of goats and hens that will learn our names.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:28px 30px;border-bottom:1px solid #3a4a2b\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--honey,#c98a2b);margin-bottom:8px\">02<\u002Fdiv>\n          <h3 style=\"margin:0 0 10px;font-family:'IM Fell English',Georgia,serif;font-weight:400;font-size:26px\">The Power<\u002Fh3>\n          <p style=\"margin:0;font-size:15px;line-height:1.6;color:#4a5a3a\">A south-facing roof of solar panels and a bank of cellar batteries to keep the workshops humming through the long winters.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:28px 30px;border-right:1px solid #3a4a2b\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--honey,#c98a2b);margin-bottom:8px\">03<\u002Fdiv>\n          <h3 style=\"margin:0 0 10px;font-family:'IM Fell English',Georgia,serif;font-weight:400;font-size:26px\">The Water<\u002Fh3>\n          <p style=\"margin:0;font-size:15px;line-height:1.6;color:#4a5a3a\">Mountain springs feeding the cisterns; greywater filtered through reed beds and returned to the orchard.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:28px 30px\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--honey,#c98a2b);margin-bottom:8px\">04<\u002Fdiv>\n          <h3 style=\"margin:0 0 10px;font-family:'IM Fell English',Georgia,serif;font-weight:400;font-size:26px\">The Hearth<\u002Fh3>\n          <p style=\"margin:0;font-size:15px;line-height:1.6;color:#4a5a3a\">Bread from the wood-fired oven, preserves for the cellar, wool from the flock, and a table long enough for everyone to come.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- daily rhythm -->\n    <div style=\"padding:clamp(34px,5.5vw,52px) clamp(20px,5vw,64px);border-bottom:1px solid #3a4a2b\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--honey,#c98a2b);margin-bottom:14px\">III. A day, roughly<\u002Fdiv>\n      <h2 style=\"margin:0 0 28px;font-family:'IM Fell English',Georgia,serif;font-weight:400;font-size:clamp(27px,5.5vw,40px);line-height:1.1\">From first light to firelight.<\u002Fh2>\n      <div style=\"max-width:580px\">\n        <sc-for list=\"{{ daySchedule }}\" as=\"row\" hint-placeholder-count=\"7\">\n          <div style=\"display:flex;align-items:baseline;gap:18px;padding:11px 0;border-bottom:1px dotted rgba(58,74,43,.45)\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:13px;color:var(--honey,#c98a2b);width:62px;flex:none\">{{ row.time }}<\u002Fspan>\n            <span style=\"font-size:17px;color:#3a4a2b\">{{ row.what }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- info packet CTA -->\n    <div id=\"packet\" style=\"padding:clamp(38px,6vw,56px) clamp(20px,5vw,64px);text-align:center;scroll-margin-top:10px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--honey,#c98a2b);margin-bottom:14px\">IV. Come find us<\u002Fdiv>\n      <h2 style=\"margin:0 0 14px;font-family:'IM Fell English',Georgia,serif;font-weight:400;font-size:clamp(32px,7vw,46px);line-height:1.05\">Curious? We'll send word.<\u002Fh2>\n      <p style=\"margin:0 auto 28px;max-width:460px;font-size:16px;line-height:1.6;color:#4a5a3a\">We're welcoming our first members this coming spring. Leave your details and we'll post you the info packet — the full story of the land, the work, and how to join.<\u002Fp>\n      <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ submit }}\" style=\"display:flex;flex-direction:column;gap:12px;max-width:400px;margin:0 auto\">\n          <input name=\"name\" required=\"\" placeholder=\"Your name\" style=\"font-family:Spectral,Georgia,serif;font-size:16px;padding:13px 15px;background:transparent;border:1px solid #3a4a2b;color:#3a4a2b;outline:none\">\n          <input name=\"email\" required=\"\" type=\"email\" placeholder=\"Where to reach you\" style=\"font-family:Spectral,Georgia,serif;font-size:16px;padding:13px 15px;background:transparent;border:1px solid #3a4a2b;color:#3a4a2b;outline:none\">\n          <button type=\"submit\" style=\"cursor:pointer;background:#3a4a2b;color:#f2ecd9;border:2px solid #3a4a2b;font-family:'Spectral SC',Georgia,serif;font-size:16px;letter-spacing:.08em;padding:14px;margin-top:4px\">Send me the packet<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:420px;margin:0 auto;border:1px solid var(--honey,#c98a2b);padding:26px;background:rgba(201,138,43,.08)\">\n          <div style=\"font-family:'IM Fell English',Georgia,serif;font-size:26px;margin-bottom:8px\">Thank you.<\u002Fdiv>\n          <p style=\"margin:0;font-size:15px;line-height:1.6;color:#4a5a3a\">The packet is on its way — by post, naturally. Watch your letterbox in a week or two.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- footer -->\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px 16px;padding:16px clamp(16px,4vw,26px);border-top:1px solid #3a4a2b;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(58,74,43,.7)\">\n      <span style=\"display:flex;align-items:center;gap:10px\"><svg viewBox=\"0 0 400 400\" width=\"30\" height=\"30\"><use href=\"#mark\"><\u002Fuse><\u002Fsvg> The Unplugged<\u002Fspan>\n      <span>{{ location }} · No service, and glad of it<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;location&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Lake Wānaka, NZ&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;elevation&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;300 m&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;population&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1,&quot;min&quot;:1,&quot;max&quot;:200,&quot;tsType&quot;:&quot;number&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#c98a2b&quot;,&quot;options&quot;:[&quot;#c98a2b&quot;,&quot;#b5532e&quot;,&quot;#3f6f7a&quot;,&quot;#8a5a6d&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;sheetEndpoint&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://script.google.com/macros/s/AKfycbyfD0AFMBmuxN66rahXCkBCUP3rqTyfMTim3JBsdzxwtIPCAF7-lLu7PetjMklq2EOn/exec&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Integrations&quot;}}\">\nclass Component extends DCLogic {\n  state = { sent: false };\n  renderVals() {\n    const daySchedule = [\n      { time: \"05:30\", what: \"First light — milk the goats, light the ovens\" },\n      { time: \"08:00\", what: \"Breakfast at the long table\" },\n      { time: \"09:00\", what: \"Gardens, glasshouse & workshops\" },\n      { time: \"13:00\", what: \"Lunch, then an hour of rest\" },\n      { time: \"15:00\", what: \"Repairs, building, planning the seasons\" },\n      { time: \"18:30\", what: \"Supper at the long table\" },\n      { time: \"20:00\", what: \"Fire, music, mending, and bed by the stars\" },\n    ];\n    return {\n      daySchedule,\n      location: this.props.location ?? \"Lake Wānaka, NZ\",\n      elevation: this.props.elevation ?? \"300 m\",\n      population: this.props.population ?? 1,\n      accent: this.props.accent ?? \"#c98a2b\",\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      submit: (e) => {\n        e.preventDefault();\n        const form = e.target;\n        const name = form.name.value.trim();\n        const email = form.email.value.trim();\n        const url = this.props.sheetEndpoint ?? \"\";\n        // Optimistically show the thank-you; log in the background.\n        this.setState({ sent: true });\n        if (url) {\n          const body = new URLSearchParams({\n            name, email,\n            source: \"The Unplugged — info packet\",\n            timestamp: new Date().toISOString(),\n          });\n          // no-cors: Apps Script web apps don't send CORS headers, so we\n          // fire-and-forget. The row still lands in the sheet.\n          fetch(url, { method: \"POST\", mode: \"no-cors\", body })\n            .catch((err) => console.warn(\"Sheet logging failed:\", err));\n        } else {\n          console.info(\"No sheetEndpoint set — captured locally:\", { name, email });\n        }\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
